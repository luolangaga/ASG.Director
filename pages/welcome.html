<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="welcome.documentTitle">欢迎使用 Idvevent Director</title>
    <link rel="stylesheet" href="./css/welcome.css">
</head>

<body>
    <div class="welcome-container">
        <header>
            <div class="logo">🎨 Idvevent Director</div>
            <div style="display:flex; justify-content:flex-end; margin-bottom:10px;">
                <select id="languageSelect" style="padding:6px 10px; border-radius:8px; background:#1f1f1f; color:#fff; border:1px solid #444;">
                    <option value="zh-CN">简体中文</option>
                    <option value="en-US">English</option>
                </select>
            </div>
            <h1 data-i18n="welcome.title">欢迎使用!</h1>
            <p class="subtitle" data-i18n="welcome.subtitle">检测到您是首次使用，当前没有任何样式配置。</p>
            <p class="description" data-i18n="welcome.description">为了获得最佳体验，我们强烈建议您安装一个初始布局包。</p>
        </header>

        <main>
            <h3 data-i18n="welcome.recommendedTitle">🔥 精选推荐布局包</h3>
            <div id="packsGrid" class="packs-grid">
                <div class="loading">
                    <div class="spinner"></div>
                    <p data-i18n="welcome.loadingRecommended">正在获取推荐布局...</p>
                </div>
            </div>
        </main>

        <footer>
            <button class="btn btn-secondary" onclick="skipWelcome()" data-i18n="welcome.skip">暂时跳过 (没有任何样式)</button>
            <button class="btn btn-primary" onclick="openFullStore()" data-i18n="welcome.openStore">前往完整商店</button>
        </footer>
    </div>

    <!-- 下载进度遮罩 -->
    <div class="progress-overlay" id="downloadProgressOverlay">
        <div class="progress-modal">
            <h3 data-i18n="welcome.downloadingPack">正在下载布局包...</h3>
            <div class="progress-track">
                <div class="progress-fill" id="downloadProgressFill"></div>
            </div>
            <div class="progress-text"><span id="downloadProgressText">0</span>%</div>
        </div>
    </div>

    <script src="./js/i18n.js"></script>
    <script src="./js/welcome.js"></script>
</body>

</html>
