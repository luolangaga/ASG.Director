<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="store.pageTitle">Idvevent布局包商店</title>

  <link rel="stylesheet" href="./css/store.css">
</head>

<body>
  <header class="header">
    <h1 data-i18n="store.pageTitle">🎨 Idvevent布局包商店</h1>
    <div class="header-actions">
      <select id="languageSelect" style="padding: 8px 10px; border-radius: 6px; background: rgba(0,0,0,0.2); color: #fff; border: 1px solid rgba(255,255,255,0.18);">
        <option value="zh-CN">简体中文</option>
        <option value="en-US">English</option>
      </select>
      <button class="btn btn-outline" onclick="checkUpdates()" data-i18n="store.checkUpdatesBtn">🔄 检查更新</button>
      <button class="btn btn-primary" onclick="showUploadModal()" data-i18n="store.uploadBtn">📤 上传布局包</button>
    </div>
  </header>

  <div class="main-container">
    <main class="content">
      <section class="browse-toolbar" aria-label="design-center-toolbar">
        <div class="view-tabs" role="tablist" aria-label="layout pack views">
          <button class="view-tab active" data-view="browse" onclick="switchView('browse')" role="tab" aria-selected="true" data-i18n="store.viewBrowse">🏪 浏览商店</button>
          <button class="view-tab" data-view="installed" onclick="switchView('installed')" role="tab" aria-selected="false" data-i18n="store.viewInstalled">📦 已安装</button>
          <button class="view-tab" data-view="my-packs" onclick="switchView('my-packs')" role="tab" aria-selected="false" data-i18n="store.viewMine">👤 我的上传</button>
        </div>

        <div class="toolbar-controls">
          <div class="search-box">
            <input
              type="text"
              id="searchInput"
              data-i18n-placeholder="store.searchPlaceholder"
              placeholder="搜索布局包..."
              oninput="handleSearch(event)"
              onkeyup="handleSearch(event)">
          </div>

          <div class="filter-group" id="sortGroup">
            <label data-i18n="store.sortLabel">排序方式</label>
            <select id="sortBy" onchange="loadPacks()">
              <option value="downloads" data-i18n="store.sortDownloads">最多下载</option>
              <option value="rating" data-i18n="store.sortRating">最高评分</option>
              <option value="newest" data-i18n="store.sortNewest">最新发布</option>
              <option value="updated" data-i18n="store.sortUpdated">最近更新</option>
            </select>
          </div>
        </div>
      </section>

      <div class="content-header">
        <h2 id="contentTitle" data-i18n="store.contentTitleBrowse">浏览商店</h2>
        <span class="pack-count" id="packCount"></span>
      </div>

      <div id="packsList" class="packs-grid">
        <!-- 动态生成 -->
      </div>

      <div id="pagination" class="pagination">
        <!-- 动态生成 -->
      </div>
    </main>
  </div>

  <!-- 详情弹窗 -->
  <div class="modal-overlay" id="detailModal">
    <div class="modal">
      <button class="modal-close" onclick="closeDetailModal()">&times;</button>
      <div class="modal-preview" id="modalPreview">
        <span>📦</span>
      </div>
      <div class="modal-content">
        <h2 class="modal-title" id="modalTitle">-</h2>
        <div class="modal-meta">
          <div class="item"><span>📌</span> <span data-i18n="store.versionLabel">版本</span> <span id="modalVersion">-</span></div>
          <div class="item"><span>👤</span> <span id="modalAuthor">-</span></div>
          <div class="item"><span>📥</span> <span id="modalDownloads">0</span> <span data-i18n="store.downloadTimes">次下载</span></div>
          <div class="item"><span>⭐</span> <span id="modalRating">-</span></div>
        </div>
        <p class="modal-description" id="modalDescription">-</p>
        <div class="pack-tags" id="modalTags"></div>
        <div style="margin: 20px 0;">
          <label style="color: #888; font-size: 12px; margin-bottom: 10px; display: block;" data-i18n="store.rateThisPack">为这个布局包评分</label>
          <div class="rating-stars" id="ratingStars">
            <span class="star" data-rating="1">⭐</span>
            <span class="star" data-rating="2">⭐</span>
            <span class="star" data-rating="3">⭐</span>
            <span class="star" data-rating="4">⭐</span>
            <span class="star" data-rating="5">⭐</span>
          </div>
        </div>
        <div id="storeDownloadProgress" style="display: none; margin-bottom: 20px;">
          <div
            style="display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 8px; color: #ffd700;">
            <span data-i18n="store.downloadingPack">正在下载布局包...</span>
            <span id="storeProgressText">0%</span>
          </div>
          <div class="progress-track"
            style="height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden;">
            <div id="storeProgressFill"
              style="height: 100%; background: linear-gradient(90deg, #ffd700, #ff8c00); width: 0%; transition: width 0.2s;">
            </div>
          </div>
        </div>
        <div class="modal-actions">
          <button class="btn btn-primary" id="downloadBtn" onclick="downloadPack()" data-i18n="store.downloadInstallBtn">📥 下载安装</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 上传弹窗 -->
  <div class="modal-overlay" id="uploadModal">
    <div class="modal">
      <button class="modal-close" onclick="closeUploadModal()">&times;</button>
      <div class="upload-form">
        <h2 style="color: #ffd700; margin-bottom: 20px;" data-i18n="store.uploadTitle">📤 上传布局包</h2>
        <p style="color: #888; font-size: 13px; margin-bottom: 20px;" data-i18n="store.uploadDescription">
          支持两种上传方式：直接打包当前布局，或手动上传本地 .bppack 文件。
        </p>

        <div class="form-group">
          <label data-i18n="store.uploadMethodLabel">上传方式 *</label>
          <div style="display: flex; flex-wrap: wrap; gap: 10px; margin-top: 8px;">
            <label
              style="display: flex; align-items: center; gap: 6px; cursor: pointer; padding: 8px 12px; background: rgba(255,215,0,0.1); border-radius: 5px; border: 1px solid rgba(255,215,0,0.3);">
              <input type="radio" name="uploadSource" id="uploadSourceCurrent" checked onchange="updateUploadSourceUI()"> <span data-i18n="store.uploadSourceCurrent">打包当前布局</span>
            </label>
            <label
              style="display: flex; align-items: center; gap: 6px; cursor: pointer; padding: 8px 12px; background: rgba(255,215,0,0.1); border-radius: 5px; border: 1px solid rgba(255,215,0,0.3);">
              <input type="radio" name="uploadSource" id="uploadSourceFile" onchange="updateUploadSourceUI()"> <span data-i18n="store.uploadSourceFile">手动上传 .bppack</span>
            </label>
          </div>
        </div>

        <div class="form-group" id="uploadPackFileGroup" style="display: none;">
          <label data-i18n="store.selectPackFileLabel">选择布局包文件（.bppack） *</label>
          <div class="preview-select">
            <button class="btn btn-outline" onclick="selectPackFile()" data-i18n="store.selectFileBtn">选择文件</button>
            <span id="uploadPackFileLabel" style="color: #888; font-size: 13px;" data-i18n="store.noFileSelected">未选择文件</span>
            <input type="hidden" id="uploadPackFilePath">
          </div>
        </div>

        <div class="form-group">
          <label data-i18n="store.selectLayoutsLabel">选择要上传的布局（打包当前布局时生效） *</label>
          <div id="uploadLayoutOptions" style="display: flex; flex-wrap: wrap; gap: 10px; margin-top: 8px;">
            <label
              style="display: flex; align-items: center; gap: 5px; cursor: pointer; padding: 8px 12px; background: rgba(255,215,0,0.1); border-radius: 5px; border: 1px solid rgba(255,215,0,0.3);">
              <input type="checkbox" id="uploadFrontendA" checked> <span data-i18n="store.layoutFrontendA">前台 (A队)</span>
            </label>
            <label
              style="display: flex; align-items: center; gap: 5px; cursor: pointer; padding: 8px 12px; background: rgba(255,215,0,0.1); border-radius: 5px; border: 1px solid rgba(255,215,0,0.3);">
              <input type="checkbox" id="uploadFrontendB"> <span data-i18n="store.layoutFrontendB">前台 (B队)</span>
            </label>
            <label
              style="display: flex; align-items: center; gap: 5px; cursor: pointer; padding: 8px 12px; background: rgba(255,215,0,0.1); border-radius: 5px; border: 1px solid rgba(255,215,0,0.3);">
              <input type="checkbox" id="uploadScoreboardA"> <span data-i18n="store.layoutScoreboardA">比分板 (A队)</span>
            </label>
            <label
              style="display: flex; align-items: center; gap: 5px; cursor: pointer; padding: 8px 12px; background: rgba(255,215,0,0.1); border-radius: 5px; border: 1px solid rgba(255,215,0,0.3);">
              <input type="checkbox" id="uploadScoreboardB"> <span data-i18n="store.layoutScoreboardB">比分板 (B队)</span>
            </label>
            <label
              style="display: flex; align-items: center; gap: 5px; cursor: pointer; padding: 8px 12px; background: rgba(255,215,0,0.1); border-radius: 5px; border: 1px solid rgba(255,215,0,0.3);">
              <input type="checkbox" id="uploadScoreboardOverview"> <span data-i18n="store.layoutScoreboardOverview">总比分板</span>
            </label>
            <label
              style="display: flex; align-items: center; gap: 5px; cursor: pointer; padding: 8px 12px; background: rgba(255,215,0,0.1); border-radius: 5px; border: 1px solid rgba(255,215,0,0.3);">
              <input type="checkbox" id="uploadCharacterDisplay"> <span data-i18n="store.layoutCharacterDisplay">角色展示</span>
            </label>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label data-i18n="store.uploadNameLabel">布局包名称 *</label>
            <input type="text" id="uploadName" data-i18n-placeholder="store.uploadNamePlaceholder" placeholder="例如：简约深色主题">
          </div>
          <div class="form-group">
            <label data-i18n="store.uploadVersionLabel">版本号 *</label>
            <input type="text" id="uploadVersion" data-i18n-placeholder="store.uploadVersionPlaceholder" placeholder="例如：1.0.0" value="1.0.0">
          </div>
        </div>

        <div class="form-group">
          <label data-i18n="store.uploadAuthorLabel">作者名称 *</label>
          <input type="text" id="uploadAuthor" data-i18n-placeholder="store.uploadAuthorPlaceholder" placeholder="你的名字或昵称">
        </div>

        <div class="form-group">
          <label data-i18n="store.uploadIntroLabel">简介描述</label>
          <textarea id="uploadDescription" data-i18n-placeholder="store.uploadIntroPlaceholder" placeholder="描述一下这个布局包的特点..."></textarea>
        </div>

        <div class="form-group">
          <label data-i18n="store.uploadTagsLabel">标签（逗号分隔）</label>
          <input type="text" id="uploadTags" data-i18n-placeholder="store.uploadTagsPlaceholder" placeholder="例如：简约,深色,比赛">
        </div>

        <div class="form-group">
          <label data-i18n="store.uploadPreviewLabel">预览图片</label>
          <div class="preview-select">
            <div class="preview-thumb" id="uploadPreviewThumb">📷</div>
            <button class="btn btn-outline" onclick="selectPreviewImage()" data-i18n="store.selectImageBtn">选择图片</button>
            <input type="hidden" id="uploadPreviewPath">
          </div>
        </div>

        <div class="form-group">
          <label>
            <input type="checkbox" id="uploadPublic" checked> <span data-i18n="store.publicRelease">公开发布（其他人可以看到和下载）</span>
          </label>
        </div>

        <div class="form-group">
          <label>
            <input type="checkbox" id="uploadAutoIncrementVersion"> <span data-i18n="store.autoVersion">🔄 同ID包自动版本递增（将覆盖上方版本号）</span>
          </label>
        </div>

        <div class="form-group">
          <label data-i18n="store.packageIdLabel">PackageId（留空自动生成，填写已有ID可更新旧版本）</label>
          <input type="text" id="uploadPackageId" data-i18n-placeholder="store.packageIdPlaceholder" placeholder="例如：abc123def456">
        </div>

        <div style="display: flex; gap: 10px; margin-top: 20px;">
          <button class="btn btn-secondary" onclick="closeUploadModal()" style="flex: 1;" data-i18n="store.cancelBtn">取消</button>
          <button class="btn btn-primary" onclick="uploadPack()" style="flex: 1;" data-i18n="store.uploadConfirmBtn">📤 上传</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="./js/i18n.js"></script>
  <script src="./js/store-logic.js"></script>
</body>

</html>
