<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>角色模型3D展示</title>
  <link rel="stylesheet" href="./css/character-model-3d.css">
</head>

<body class="edit-mode">
  <div class="window-frame"></div>
  <div class="drag-bar">
    <span class="drag-title">角色模型3D展示</span>
  </div>
  <div id="toolbar" class="toolbar">
    <div class="toolbar-title">角色模型3D展示</div>
    <div class="toolbar-row">
      <button id="modeToggleBtn" class="btn">切换到渲染模式 (F2)</button>
      <button id="sceneImportBtn" class="btn">导入场景(GLTF/GLB)</button>
      <button id="sceneClearBtn" class="btn">清空场景</button>
      <button id="videoImportBtn" class="btn">导入视频屏幕</button>
      <button id="videoClearBtn" class="btn">清除视频屏幕</button>
    </div>
    <div class="toolbar-row">
      <span class="label">视频屏幕</span>
      <label><input id="videoLoopEnabled" type="checkbox" checked> 循环播放</label>
      <label><input id="videoMuted" type="checkbox" checked> 静音</label>
      <label>宽<input id="videoWidth" type="number" step="0.1" min="0.1" value="2.2"></label>
      <label>高<input id="videoHeight" type="number" step="0.1" min="0.1" value="1.2"></label>
      <button id="applyVideoSettingsBtn" class="btn">应用视频参数</button>
    </div>
    <div class="toolbar-row">
      <span class="label">天空与光影预设</span>
      <select id="environmentPresetSelect">
        <option value="duskCinema">电影感黄昏</option>
        <option value="cyberpunkNight">赛博朋克夜景</option>
        <option value="horrorNight">恐怖风夜晚</option>
      </select>
      <label>画质
        <select id="renderQualitySelect">
          <option value="low">低</option>
          <option value="medium">中</option>
          <option value="high" selected>高</option>
          <option value="cinematic">电影级</option>
        </select>
      </label>
      <button id="applyEnvironmentPresetBtn" class="btn">应用预设</button>
      <label><input id="fogEnabled" type="checkbox" checked> 雾化效果滤镜</label>
      <label>雾化强度<input id="fogStrength" type="number" step="0.05" min="0" max="3" value="1"></label>
      <label>阴影强度<input id="shadowStrength" type="number" step="0.01" min="0" max="1" value="0.45"></label>
      <label><input id="droneModeEnabled" type="checkbox"> 无人机模式</label>
      <span class="label">出场动画</span>
      <select id="entranceEffectSelect">
        <option value="fade">淡入</option>
        <option value="flameDissolve">火焰溶解</option>
        <option value="none">关闭</option>
      </select>
    </div>
    <div class="toolbar-row">
      <span class="label">编辑对象</span>
      <div id="slotTabs" class="slot-tabs"></div>
    </div>
    <div class="toolbar-row grid">
      <label>X<input id="posX" type="number" step="0.01"></label>
      <label>Y<input id="posY" type="number" step="0.01"></label>
      <label>Z<input id="posZ" type="number" step="0.01"></label>
      <label>RotX<input id="rotX" type="number" step="1"></label>
      <label>RotY<input id="rotY" type="number" step="1"></label>
      <label>RotZ<input id="rotZ" type="number" step="1"></label>
      <label>Scale（求生者共用 / 监管者独立）<input id="uniScale" type="number" step="0.01" min="0.01"></label>
      <button id="applyTransformBtn" class="btn">应用</button>
    </div>
    <div class="toolbar-row">
      <span class="label">摄像机关键帧</span>
      <select id="cameraEventSelect">
        <option value="survivor1">求生者选了1个</option>
        <option value="survivor2">求生者选了2个</option>
        <option value="survivor3">求生者选了3个</option>
        <option value="survivor4">求生者选了4个</option>
        <option value="hunterSelected">监管者选了</option>
      </select>
      <button id="saveCameraKeyframeBtn" class="btn">记录当前视角</button>
      <button id="previewCameraKeyframeBtn" class="btn">预览关键帧</button>
      <button id="clearCameraKeyframeBtn" class="btn">清除关键帧</button>
      <label>切换时长ms<input id="cameraTransitionMs" type="number" step="50" min="50" max="10000" value="900"></label>
      <span id="cameraEventInfo" class="label"></span>
    </div>
    <div class="toolbar-row camera-move-row">
      <span class="label">摄像机六向移动</span>
      <div class="camera-move-pad">
        <button class="btn btn-move" data-cam-move="forward">前</button>
        <button class="btn btn-move" data-cam-move="back">后</button>
        <button class="btn btn-move" data-cam-move="left">左</button>
        <button class="btn btn-move" data-cam-move="right">右</button>
        <button class="btn btn-move" data-cam-move="up">上</button>
        <button class="btn btn-move" data-cam-move="down">下</button>
      </div>
      <label>步进<input id="cameraMoveStep" type="number" step="0.01" min="0.001" value="0.25"></label>
      <span class="label">点击移动 / 按住连续移动</span>
    </div>
    <div class="toolbar-row">
      <span class="label">光源参数</span>
      <label>颜色<input id="lightColor" type="color" value="#fff1d6"></label>
      <label>强度<input id="lightIntensity" type="number" step="0.1" min="0" value="2.4"></label>
      <button id="applyLightBtn" class="btn">应用光源</button>
    </div>
    <div class="toolbar-row hint">
      左键拖拽旋转，右键拖拽(或 Shift+左键)平移视角，滚轮缩放。WASD前后左右，QE上下；按住 Shift + WASD 调整摄像机朝向。
    </div>
  </div>

  <div id="renderRoot" class="render-root"></div>
  <div id="fogOverlay" class="fog-overlay"></div>
  <div id="cinemaOverlay" class="cinema-overlay"></div>
  <div id="fpsBadge" class="fps-badge">FPS: --</div>
  <div id="statusBar" class="status-bar">初始化中...</div>

  <script src="./js/character-model-3d-logic.js"></script>
</body>

</html>
